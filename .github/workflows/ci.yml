name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-protocol:
    name: DispadProtocol tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: swift test
        working-directory: DispadProtocol
        run: swift test --parallel

  build-host:
    name: DispadHost build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: DispadHost
        run: xcodegen generate
      - name: xcodebuild
        run: |
          xcodebuild \
            -workspace Dispad.xcworkspace \
            -scheme DispadHost \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  build-client:
    name: DispadClient build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: DispadClient
        run: xcodegen generate
      - name: xcodebuild
        run: |
          xcodebuild \
            -workspace Dispad.xcworkspace \
            -scheme DispadClient \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
