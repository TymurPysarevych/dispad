name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install build tooling
        run: brew install xcodegen create-dmg
      - name: Build DMG
        env:
          TAG: ${{ github.ref_name }}
        run: ./scripts/build-dmg.sh "${TAG#v}"
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "dispad $TAG" \
            --notes "Download the DMG, drag DispadHost.app to /Applications, and follow the first-launch wizard." \
            dist/*.dmg
